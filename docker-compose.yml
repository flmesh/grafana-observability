services:
  loki:
    image: grafana/loki:3.7.1
    container_name: loki
    command: -config.file=/etc/loki/config.yaml
    ports:
      - "3100:3100"
    healthcheck:
      test:
        - CMD
        - /usr/bin/loki
        - -verify-config=true
        - -config.file=/etc/loki/config.yaml
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: redis
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - redis-data:/data
    restart: unless-stopped

  hubot:
    image: ghcr.io/flmesh/hubot:${HUBOT_IMAGE_TAG:-1}
    pull_policy: always
    container_name: hubot
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    env_file:
      - .env
    environment:
      HUBOT_NAME: ${HUBOT_NAME:-hubot}
      HUBOT_LOG_LEVEL: ${HUBOT_LOG_LEVEL:-info}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LOKI_URL: ${LOKI_URL:-http://loki:3100}
      LOKI_USERNAME: ${LOKI_USERNAME:-}
      LOKI_PASSWORD: ${LOKI_PASSWORD:-}
      NODE_LOGS_CACHE_TTL_SECONDS: ${NODE_LOGS_CACHE_TTL_SECONDS:-30}
      MONGO_HOST: ${MONGO_HOST:-host.docker.internal}
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_USERNAME: ${MONGO_USERNAME:-}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-}
      MONGO_AUTH_SOURCE: ${MONGO_AUTH_SOURCE:-mqtt}
      MONGO_URL: ${MONGO_URL:-}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-mqtt}
      HUBOT_DISCORD_PERMISSION_GUILD_ID: ${HUBOT_DISCORD_PERMISSION_GUILD_ID:-}
      MQTT_ADMIN_GUILD_ID: ${MQTT_ADMIN_GUILD_ID:-}
      MQTT_ADMIN_ROLE_IDS: ${MQTT_ADMIN_ROLE_IDS:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    init: true
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "8080"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      loki:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.16.1
    container_name: alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    ports:
      - "12345:12345"
    healthcheck:
      test:
        - CMD
        - /bin/bash
        - -c
        - "echo -e 'GET /-/ready HTTP/1.1\\nHost: localhost\\nConnection: close\\n\\n' > /dev/tcp/localhost/12345"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    env_file:
      - .env
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DOCKER_API_VERSION: "1.40"
      WATCHTOWER_LABEL_ENABLE: true
      WATCHTOWER_CLEANUP: true
      WATCHTOWER_SCHEDULE: "@hourly"
      WATCHTOWER_INCLUDE_RESTARTING: true
      TZ: America/New_York

volumes:
  loki-data:
  grafana-data:
  redis-data:
